[package]
name = "cargo-cunew"
description = "Bootstrap Copper projects from bundled templates."
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true
readme = "README.md"
include = ["README.md", "src/**", "templates/**"]

[dependencies]
anyhow = { workspace = true, features = ["std"] }
# Keep auth-git2 on git2 0.20.x until its version range is tightened upstream.
cargo-generate = "=0.23.8"
clap = { workspace = true }
git2 = { version = "=0.20.4", default-features = false, features = [
  "ssh",
  "https",
] }
include_dir = "0.7.4"
libc = { workspace = true }
pathdiff = "0.2.3"
reqwest = { version = "0.13", default-features = false, features = [
  "blocking",
  "json",
  "rustls",
] }
serde = { workspace = true, features = ["std"] }
tempfile = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }
