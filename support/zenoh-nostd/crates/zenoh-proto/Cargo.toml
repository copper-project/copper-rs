[package]
name = "zenoh-proto"
authors.workspace = true
categories.workspace = true
description.workspace = true
edition.workspace = true
homepage.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
version.workspace = true

[features]
default = []

std = []

log = ["std", "dep:log"]
defmt = ["dep:defmt"]
web_console = ["std", "dep:web-sys"]

# Bare-metal/no-OS targets: enable getrandom's custom backend so the
# transitive uhlc -> rand -> getrandom dependency does not fail with
# "target is not supported". The backend is registered by the final
# binary via `register_custom_getrandom!`.
embedded = ["dep:getrandom"]

[dependencies]
zenoh-derive.workspace = true
uhlc.workspace = true
sha3.workspace = true

log = { workspace = true, optional = true }
defmt = { workspace = true, optional = true }
web-sys = { workspace = true, optional = true }
getrandom = { version = "0.2", features = ["custom"], optional = true }

[dev-dependencies]
rand.workspace = true
paste.workspace = true
criterion.workspace = true
