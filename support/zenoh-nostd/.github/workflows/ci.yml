name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (default features)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (log feature)
        run: cargo clippy --workspace --all-targets --features log -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test (default)
        run: cargo test --workspace
      - name: Test (log feature)
        run: cargo test --workspace --features log

  build-std:
    name: Build (std/host)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace (default features)
        run: cargo build --workspace
      - name: Build workspace (log feature)
        run: cargo build --workspace --features log
      - name: Build examples package
        run: cargo build --package zenoh-examples --all-targets

  build-no-std:
    name: Build (no_std / bare-metal)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Build no_std libs (no default features)
        run: >
          cargo build
          -p zenoh-proto -p zenoh-sansio -p zenoh-nostd
          --no-default-features --features embedded
          --target thumbv7em-none-eabihf
      - name: Build no_std libs (defmt feature)
        run: >
          cargo build
          -p zenoh-proto -p zenoh-sansio -p zenoh-nostd
          --no-default-features --features defmt,embedded
          --target thumbv7em-none-eabihf
      - name: Build zenoh-nostd (alloc feature)
        run: >
          cargo build
          -p zenoh-nostd
          --no-default-features --features alloc,embedded
          --target thumbv7em-none-eabihf

  msrv:
    name: MSRV (1.91.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.91.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  docs:
    name: Docs
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps

  platform-std:
    name: Build platform (zenoh-std)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --manifest-path platforms/zenoh-std/Cargo.toml

  platform-wasm:
    name: Build platform (zenoh-wasm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --manifest-path platforms/zenoh-wasm/Cargo.toml --target wasm32-unknown-unknown

  # Heavy non-tier-1 toolchain (Xtensa via esp-rs). Kept non-blocking so the
  # core checks are never gated on an external toolchain install. Promote to a
  # required check once it is proven stable.
  platform-esp32:
    name: Build platform (zenoh-embassy / esp32s3)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          buildtargets: esp32s3
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --manifest-path platforms/zenoh-embassy/Cargo.toml

  # NOTE: In GitHub repository settings, the "Require status checks to pass
  # before merging" branch protection rule ensures that commits are only merged
  # from branches where specific status checks have passed. These checks are
  # specified manually as a list of workflow job names. Thus we use this extra
  # job to signal whether all CI checks have passed.
  ci:
    name: CI status checks
    runs-on: ubuntu-latest
    needs:
      - fmt
      - clippy
      - test
      - build-std
      - build-no-std
      - msrv
      - docs
      - platform-std
      - platform-wasm
    if: always()
    steps:
      - name: Check whether all jobs pass
        run: echo '${{ toJson(needs) }}' | jq -e 'all(.result == "success")'
