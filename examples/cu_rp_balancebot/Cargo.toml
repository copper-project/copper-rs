[package]
name = "cu-rp-balancebot"
description = "This is a full robot example for the Copper project. It runs on the Raspberry Pi with the balance bot hat to balance a rod."
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/cu-rp-balancebot"
default-run = "balancebot-sim"

[package.metadata.copper]
environments = ["host"]
ci_exclude_workspace = true

[package.metadata.cargo-shear]
ignored = ["serde"]

[dependencies]
serde = { workspace = true }
bevy_ecs = { version = "0.19.0", default-features = false }
cu-ads7883-new = { workspace = true }
cu-rp-sn754410-new = { workspace = true }
cu-rp-encoder = { workspace = true }
cu-pid = { workspace = true }

# Log reader depencies
cu29-export = { workspace = true, optional = true, features = [
  "python",
  "mcap",
] }

avian3d = { workspace = true, default-features = false, features = [
  "bevy_scene",
  "collider-from-mesh",
  "debug-plugin",
  "parallel",
  "f32",
  "3d",
  "parry-f32",
  "xpbd_joints",
], optional = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
cu29 = { workspace = true }
cu-consolemon = { workspace = true }
cu-bevymon = { workspace = true, optional = true }
cu-memmon = { path = "../../components/monitors/cu_memmon", version = "1.0.0", default-features = false, features = [
  "std",
  "memory_monitoring",
], optional = true }
image = { workspace = true, default-features = false, features = [
  "png",
], optional = true }
bevy = { workspace = true, default-features = false, features = [
  "x11",
  "wayland",
  "default_font",
  "bevy_render",
  "bevy_window",
  "bevy_core_pipeline",
  "bevy_pbr",
  "bevy_scene",
  "bevy_sprite",
  "bevy_gltf",
  "gltf_animation",
  "bevy_picking",
  "mesh_picking",
  "tonemapping_luts",
  "bevy_ui",
  "bevy_ui_render",
  "ktx2",
  "jpeg",
  "png",
  "zstd_rust",
  "trace",
  "reflect_auto_register",
], optional = true }
cached-path = { workspace = true, features = [
  "progress-bar",
  "rustls-tls",
], optional = true }
winit = { version = "=0.30.13", default-features = false, optional = true }
bevy_anti_alias = { version = "0.19.0", optional = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
cu29 = { path = "../../core/cu29", version = "1.0.0", default-features = false, features = [
  "std",
  "textlogs",
  "units",
] }
cu-bevymon = { path = "../../components/monitors/cu_bevymon", version = "1.0.0", default-features = false, optional = true }
bevy_anti_alias = { version = "0.19.0", optional = true }
bevy = { workspace = true, default-features = false, features = [
  "default_font",
  "bevy_render",
  "bevy_window",
  "bevy_core_pipeline",
  "bevy_pbr",
  "bevy_scene",
  "bevy_sprite",
  "bevy_gltf",
  "gltf_animation",
  "bevy_picking",
  "mesh_picking",
  "tonemapping_luts",
  "bevy_ui",
  "bevy_ui_render",
  "ktx2",
  "jpeg",
  "png",
  "zstd_rust",
  "reflect_auto_register",
], optional = true }

[features]
default = ["logreader", "sim"]
# generates an executable to read the logs
logreader = ["dep:cu29-export"]
sim_core = ["cu29/sysclock-perf"]
# dependencies to run the Bevy-based balancebot sim
sim = [
  "sim_core",
  "dep:bevy",
  "dep:bevy_anti_alias",
  "dep:avian3d",
  "dep:cached-path",
  "dep:image",
  "dep:winit",
]
sim-debug = ["logreader", "cu29/reflect", "cu29/remote-debug"]
bevymon = ["sim", "dep:cu-bevymon"]
# Swap the default console monitor for cu-memmon (per-task heap-allocation
# tracking). Mutually exclusive with `bevymon` at the type-alias level.
memmon = ["sim", "dep:cu-memmon"]

[[bin]]
name = "balancebot"
path = "src/main.rs"

[[bin]]
name = "balancebot-logreader"
path = "src/logreader.rs"
required-features = ["logreader"]

[[bin]]
name = "balancebot-bevymon"
path = "src/bevymon.rs"
required-features = ["bevymon"]

[[bin]]
name = "balancebot-sim"
path = "src/sim.rs"
required-features = ["sim"]

[[bin]]
name = "balancebot-resim"
path = "src/resim.rs"
required-features = ["sim-debug"]

[build-dependencies]
cu29-build = { workspace = true }
