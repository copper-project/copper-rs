[package]
name = "cu-rate-target"
description = "Example showing how to set a runtime rate target for the Copper application."
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true
default-run = "rate-target"

publish = false

[features]
default = []
high-precision-limiter = ["cu29/high-precision-limiter"]

[dependencies]
cu29 = { workspace = true, features = ["log-level-info"] }
serde = { workspace = true }
cu29-export = { workspace = true }

[lib]
path = "src/lib.rs"

[[bin]]
name = "rate-target"
path = "src/bin/rate_target.rs"

[[bin]]
name = "rate-target-precise"
path = "src/bin/rate_target_precise.rs"
required-features = ["high-precision-limiter"]

[package.metadata.cargo-shear]
ignored = ["serde", "cu29-export"]
