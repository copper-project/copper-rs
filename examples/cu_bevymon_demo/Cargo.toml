[package]
name = "cu-bevymon-demo"
description = "Minimal side-by-side Bevy sim and Copper monitor demo."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true
default-run = "cu-bevymon-demo"

[dependencies]
bevy_ecs = { version = "0.18.1", default-features = false }
cu29 = { path = "../../core/cu29", version = "0.13.0", default-features = false, features = [
  "std",
  "textlogs",
] }
bincode = { workspace = true }
serde = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
bevy = { workspace = true, default-features = false, features = [
  "x11",
  "wayland",
  "default_font",
  "bevy_render",
  "bevy_window",
  "bevy_core_pipeline",
  "bevy_pbr",
  "bevy_ui",
  "bevy_ui_render",
] }
cu-bevymon = { path = "../../components/monitors/cu_bevymon", version = "0.13.0" }

[target.'cfg(target_arch = "wasm32")'.dependencies]
bevy = { workspace = true, default-features = false, features = [
  "default_font",
  "bevy_render",
  "bevy_window",
  "bevy_core_pipeline",
  "bevy_pbr",
  "bevy_ui",
  "bevy_ui_render",
] }
cu-bevymon = { path = "../../components/monitors/cu_bevymon", version = "0.13.0", default-features = false }

[[bin]]
name = "cu-bevymon-demo"
path = "src/main.rs"
