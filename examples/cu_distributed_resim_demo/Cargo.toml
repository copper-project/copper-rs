[package]
name = "cu-distributed-resim-demo"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true
description = "Distributed replay demo with three subsystems and multiple instance_ids."

publish = false
default-run = "distributed-scout"

[dependencies]
cu29 = { workspace = true }
cu29-export = { workspace = true }
cu29-helpers = { workspace = true }
cu29-unifiedlog = { workspace = true }
cu-zenoh-bridge = { path = "../../components/bridges/cu_zenoh_bridge", version = "0.14.0" }
serde = { workspace = true }
bincode = { workspace = true }

[[bin]]
name = "distributed-scout"
path = "src/bin/scout.rs"

[[bin]]
name = "distributed-plan"
path = "src/bin/plan.rs"

[[bin]]
name = "distributed-control"
path = "src/bin/control.rs"

[[bin]]
name = "distributed-resim"
path = "src/bin/resim.rs"
