<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Copper Flight Controller BevyMon</title>
    <link
      data-trunk
      rel="rust"
      data-bin="quad-bevymon"
      data-cargo-features="bevymon"
      data-cargo-no-default-features
    />
    <link data-trunk rel="copy-dir" href="assets" />
    <style>
      :root {
        color-scheme: dark;
        font-family: "JetBrains Mono", "Fira Code", monospace;
        --guide-bg: rgba(6, 10, 14, 0.8);
        --guide-border: rgba(135, 166, 194, 0.34);
        --guide-text: #d7e2ec;
        --guide-strong: #f4f7fa;
        --guide-accent: #9dcfff;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #05070a;
      }

      body {
        position: relative;
        background:
          radial-gradient(circle at top, #162330 0%, #0b1118 46%, #05070a 100%);
      }

      #bevy {
        display: block;
        width: 100vw;
        height: 100vh;
        touch-action: none;
      }

      .guide-overlay {
        position: fixed;
        inset: 0;
        z-index: 2;
        pointer-events: none;
      }

      .guide-lines {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      .guide-lines .guide-line {
        fill: none;
        stroke: var(--guide-accent);
        stroke-width: 0.5;
        stroke-linecap: round;
        filter: drop-shadow(0 0 10px rgba(78, 147, 214, 0.34));
      }

      .guide-card {
        position: absolute;
        padding: 12px 14px;
        border: 1px solid var(--guide-border);
        border-radius: 14px;
        background: var(--guide-bg);
        color: var(--guide-text);
        font-size: clamp(11px, 1.05vw, 14px);
        line-height: 1.45;
        letter-spacing: 0.02em;
        backdrop-filter: blur(12px);
        box-shadow: 0 16px 34px rgba(0, 0, 0, 0.3);
      }

      .guide-card strong {
        color: var(--guide-strong);
      }

      .guide-card kbd {
        display: inline-block;
        min-width: 1.5em;
        padding: 0.1em 0.4em;
        border: 1px solid rgba(157, 207, 255, 0.38);
        border-bottom-width: 2px;
        border-radius: 6px;
        background: rgba(157, 207, 255, 0.1);
        color: var(--guide-strong);
        font: inherit;
        text-align: center;
      }

      .guide-top {
        top: clamp(14px, 2.2vh, 28px);
        left: 50%;
        width: min(34rem, 72vw);
        transform: translateX(-50%);
        text-align: center;
      }

      .guide-sim {
        left: clamp(12px, 3vw, 32px);
        bottom: clamp(14px, 3.5vh, 34px);
        width: min(20rem, 36vw);
      }

      .guide-monitor {
        right: clamp(12px, 3vw, 32px);
        bottom: clamp(14px, 3.5vh, 34px);
        width: min(25rem, 42vw);
      }

      @media (max-width: 980px) {
        .guide-card {
          border-radius: 12px;
          padding: 10px 12px;
          font-size: 11px;
        }

        .guide-top {
          width: min(32rem, calc(100vw - 24px));
        }

        .guide-sim,
        .guide-monitor {
          width: min(18rem, calc(50vw - 20px));
        }
      }
    </style>
  </head>
  <body>
    <!-- Trunk page shell for `just web` and `just web-dist`. -->
    <div class="guide-overlay" aria-hidden="true">
      <svg class="guide-lines" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
          <marker
            id="guide-arrowhead"
            markerWidth="6"
            markerHeight="6"
            refX="5"
            refY="3"
            orient="auto"
          >
            <path d="M0,0 L6,3 L0,6 z" fill="#9dcfff" />
          </marker>
        </defs>

        <path
          class="guide-line"
          d="M47 15 C40 17, 32 20, 26 28"
          marker-end="url(#guide-arrowhead)"
        />
        <path
          class="guide-line"
          d="M53 15 C60 17, 68 20, 74 28"
          marker-end="url(#guide-arrowhead)"
        />
        <path
          class="guide-line"
          d="M22 82 C22 74, 21 66, 19 58"
          marker-end="url(#guide-arrowhead)"
        />
        <path
          class="guide-line"
          d="M78 82 C78 74, 79 66, 81 58"
          marker-end="url(#guide-arrowhead)"
        />
      </svg>

      <div class="guide-card guide-top">
        <strong>Click to focus on either the Sim or the monitor.</strong>
      </div>

      <div class="guide-card guide-sim">
        Press <kbd>Space</kbd> to arm, then throttle up on the Sim side.
      </div>

      <div class="guide-card guide-monitor">
        Click tabs or press <kbd>1</kbd>, <kbd>2</kbd>, <kbd>3</kbd>. Use
        <kbd>&larr;</kbd> and <kbd>&rarr;</kbd> to scroll monitor views.
      </div>
    </div>
    <canvas id="bevy"></canvas>
  </body>
</html>
