[package]
name = "cu-image-codec-demo"
description = "Example comparing PNG and FFV1 image log codecs."
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

publish = false

[[bin]]
name = "cu-image-codec-demo"
path = "src/main.rs"

[[bin]]
name = "cu-image-codec-demo-logreader"
path = "src/logreader.rs"
required-features = ["logreader"]

[features]
default = []
ffv1 = ["dep:cu-ffv1-codec", "dep:cu-png-codec"]
logreader = ["ffv1", "dep:cu29-export"]

[dependencies]
cu-ffv1-codec = { workspace = true, optional = true, features = ["ffmpeg"] }
cu-png-codec = { workspace = true, optional = true }
cu-sensor-payloads = { workspace = true }
cu29 = { workspace = true }
cu29-export = { workspace = true, optional = true }
serde = { workspace = true }
