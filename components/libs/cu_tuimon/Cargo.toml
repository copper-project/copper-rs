[package]
name = "cu-tuimon"
description = "Shared Ratatui TUI rendering for Copper monitors."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
default = []
log_pane = ["dep:cu29-log", "dep:cu29-log-runtime"]
stderr_capture = ["log_pane", "dep:gag"]
sysinfo = [
  "dep:dotenvy",
  "dep:libmacchina",
  "dep:pfetch",
  "dep:pfetch-logo-parser",
]

[dependencies]
ansi-to-tui = { version = "8.0.0", default-features = false }
compact_str = { workspace = true }
cu29 = { path = "../../../core/cu29", version = "0.15.0", default-features = false, features = [
  "std",
] }
cu29-log = { workspace = true, optional = true }
cu29-log-runtime = { workspace = true, optional = true }
gag = { version = "1.0.0", optional = true }
ratatui = { version = "0.30", default-features = false }
tui-widgets = { version = "0.7.0", default-features = false, features = [
  "scrollview",
] }
web-time = "1.1.0"

[target.'cfg(not(all(target_family = "wasm", target_os = "unknown")))'.dependencies]
dotenvy = { version = "0.15.7", optional = true }
libc = { workspace = true }
libmacchina = { version = "8.1.0", optional = true }
pfetch = { version = "2.11.1", optional = true }
pfetch-logo-parser = { version = "0.1.1", optional = true }


[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
js-sys = "0.3"
wasm-bindgen = "0.2"
web-sys = { version = "0.3", features = [
  "Location",
  "Navigator",
  "Screen",
  "Window",
] }
