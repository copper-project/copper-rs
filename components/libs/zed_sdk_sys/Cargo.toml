[package]
name = "zed-sdk-sys"
version = "0.15.0"
edition = "2024"
license = "Apache-2.0"
description = "Raw Rust FFI bindings for the Stereolabs ZED C API"
repository = "https://github.com/copper-project/copper-rs"
links = "sl_zed_c"
build = "build.rs"

[lib]
path = "src/lib.rs"

[[bin]]
name = "zed_lowlevel_demo"
path = "src/bin/zed_lowlevel_demo.rs"

[features]
default = []

[package.metadata.cargo-shear]
ignored = []

[build-dependencies]
cc = "1.2"
