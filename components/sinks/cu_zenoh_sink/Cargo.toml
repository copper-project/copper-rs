[package]
name = "cu-zenoh-sink"
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true
documentation = "https://docs.rs/cu-zenoh-sink"
description = "Copper sink task for Zenoh."

[package.metadata.copper]
kind = "sink"
domains = ["middleware/zenoh"]
environments = ["host"]

[dependencies]
zenoh = { workspace = true, default-features = false, features = [
  "transport_tcp",
] }
cu29 = { workspace = true }

[build-dependencies]
cu29-build = { workspace = true }
