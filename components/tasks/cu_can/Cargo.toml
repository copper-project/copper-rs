[package]
name = "cu-can"
description = "CAN bus source, sink, and filter tasks for the Copper project — ISO 11898 over SocketCAN."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
cu29 = { path = "../../../core/cu29", version = "0.13.0", default-features = false }
cu-automotive-payloads = { path = "../../payloads/cu_automotive_payloads", version = "0.13.0", default-features = false }
bincode = { workspace = true }
serde = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"

[features]
default = ["std"]
std = ["cu29/std", "cu-automotive-payloads/std"]
textlogs = ["cu29/textlogs"]
mock = []
