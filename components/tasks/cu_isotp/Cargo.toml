[package]
name = "cu-isotp"
description = "ISO 15765-2 (ISO-TP) transport protocol task for CAN segmentation and reassembly — Copper project."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
cu29 = { path = "../../../core/cu29", version = "0.13.0", default-features = false }
cu-automotive-payloads = { path = "../../payloads/cu_automotive_payloads", version = "0.13.0", default-features = false }
bincode = { workspace = true }
serde = { workspace = true }

[features]
default = ["std"]
std = ["cu29/std", "cu-automotive-payloads/std"]
textlogs = ["cu29/textlogs"]
