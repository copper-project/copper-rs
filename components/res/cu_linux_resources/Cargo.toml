[package]
name = "cu-linux-resources"
description = "Linux/host resource bundle for serial, I2C and GPIO devices."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[package.metadata.copper]
kind = "resource"
domains = ["resource/host-bundle"]
environments = ["host"]
host_os = ["linux"]

[dependencies]
cu29 = { path = "../../../core/cu29", version = "0.15.0", default-features = false, features = [
  "std",
] }
embedded-hal = { version = "1.0.0", default-features = false }
embedded-io = { version = "0.7.1", default-features = false, features = [
  "std",
] }
serialport = { workspace = true }

[target.'cfg(target_os = "linux")'.dependencies]
linux-embedded-hal = { workspace = true }
rppal = { workspace = true, default-features = false, features = ["hal"] }

[features]
default = []
defmt = ["embedded-io/defmt", "embedded-hal/defmt-03", "cu29/defmt"]
alloc = ["embedded-io/alloc"]
