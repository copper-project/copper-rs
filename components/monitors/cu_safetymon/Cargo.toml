[package]
name = "cu-safetymon"
description = "Safety monitor for Copper: watchdog, panic capture, fault latching with exit codes."
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true
build = "build.rs"

[package.metadata.copper]
kind = "monitor"
domains = ["monitor/safety"]
environments = ["host", "embedded"]

[lib]
path = "src/lib.rs"

[dependencies]
cu29 = { path = "../../../core/cu29", version = "0.15.0", default-features = false }

[dev-dependencies]
cu-logmon = { path = "../cu_logmon", version = "0.15.0", default-features = false, features = [
  "std",
] }

[features]
default = ["std"]
std = ["cu29/std"]
