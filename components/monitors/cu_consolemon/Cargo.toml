[package]
name = "cu-consolemon"
description = "A monitoring TUI for Copper. See the main Copper repository for more information."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[package.metadata.copper]
kind = "monitor"
domains = ["monitor/visualization", "ui/tui"]
environments = ["host"]

[features]
default = ["debug_pane"]
# Enables 'Debug Output' Pane
debug_pane = ["cu-tuimon/log_pane", "cu-tuimon/stderr_capture", "dep:arboard"]
sysinfo = ["cu-tuimon/sysinfo_pane"]

[dependencies]
cu29 = { workspace = true }
cu-tuimon = { path = "../../libs/cu_tuimon", version = "0.15.0", default-features = false }
compact_str = { workspace = true }
ratatui = "0.30"
ansi-to-tui = { version = "8.0.0", default-features = false }
tui-widgets = "0.7.0"
color-eyre = { version = "0.6.4", default-features = false }
gag = "1.0.0"
arboard = { version = "3.6.1", optional = true, default-features = false }

[target.'cfg(unix)'.dependencies]
libc = { workspace = true }
