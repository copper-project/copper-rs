[package]
name = "cu-bevymon"
description = "A Bevy-backed Ratatui monitor for Copper."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[features]
default = ["stderr_capture"]
stderr_capture = ["cu-tuimon/stderr_capture"]

[dependencies]
bevy = { workspace = true }
bevy_ratatui = { workspace = true, features = ["windowed"] }
cu29 = { path = "../../../core/cu29", version = "0.13.0", default-features = false, features = [
  "std",
] }
cu-tuimon = { path = "../../libs/cu_tuimon", version = "0.13.0", default-features = false, features = [
  "log_pane",
] }
ratatui = { version = "0.30.0", default-features = false }
soft_ratatui = { version = "0.1.3", default-features = false, features = [
  "embedded-ttf",
] }
