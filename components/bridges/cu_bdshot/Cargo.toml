[package]
name = "cu-bdshot"
description = "Copper Bridge to Bidirectional DSHOT ESCs."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[package.metadata.copper]
embedded_only = true
embedded_target = "thumbv8m.main-none-eabihf"

[dependencies]
cu29 = { path = "../../../core/cu29", version="0.11.0", default-features = false }
serde = { workspace = true, features = ["derive"] }
bincode = { workspace = true, features = ["alloc"] }
spin = { workspace = true }
defmt = "1.0.1"

rp235x-hal = { version = "0.3", features = ["critical-section-impl"], optional = true }
pio = { version = "=0.2.1", optional = true }  # Needed for RP2350 support
pio-proc = { version = "=0.2.1", optional = true }
cortex-m = { version = "0.7.7", optional = true }
stm32h7xx-hal = { version = "0.16.0", default-features = false, optional = true }

[features]
default = ["stm32"]
stm32 = ["cortex-m"]
rp2350 = ["rp235x-hal", "pio", "pio-proc", "cortex-m"]
