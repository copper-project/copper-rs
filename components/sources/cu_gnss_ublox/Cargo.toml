[package]
name = "cu-gnss-ublox"
description = "Copper GNSS source for u-blox UBX receivers (protocol 34+)"
readme = "README.md"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[package.metadata.copper]
kind = "source"
domains = ["sensor/gnss"]
environments = ["host", "embedded"]

[dependencies]
cu29 = { path = "../../../core/cu29", version = "0.15.0", default-features = false }
cu-linux-resources = { workspace = true, optional = true }
cu-gnss-payloads = { path = "../../payloads/cu_gnss_payloads", version = "0.15.0", default-features = false }
embedded-io = "0.7.1"

[features]
default = ["std"]
std = ["cu29/std", "cu-gnss-payloads/std", "dep:cu-linux-resources"]
textlogs = ["cu29/textlogs", "cu-gnss-payloads/textlogs"]
reflect = ["cu29/reflect", "cu-gnss-payloads/reflect"]
