[package]
name = "cu-ist8310"
description = "Copper source driver for the IST8310 digital magnetometer."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
cu29 = { path = "../../../core/cu29", version = "0.14.0", default-features = false }
cu-sensor-payloads = { path = "../../payloads/cu_sensor_payloads", version = "0.14.0", default-features = false }

[features]
default = []
std = ["cu29/std", "cu-sensor-payloads/std"]
defmt = ["cu29/defmt"]
textlogs = ["cu29/textlogs", "cu-sensor-payloads/textlogs"]
