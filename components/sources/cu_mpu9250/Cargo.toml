[package]
name = "cu-mpu9250"
description = "Copper source driver for the MPU9250 IMU."
version.workspace = true
authors.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[package.metadata.copper]
kind = "source"
domains = ["sensor/imu"]
environments = ["host", "embedded"]

[dependencies]
cu29 = { path = "../../../core/cu29", version = "0.15.0", default-features = false, features = [
  "units",
] }
cu-sensor-payloads = { path = "../../payloads/cu_sensor_payloads", version = "0.15.0", default-features = false }
mpu9250 = { version = "0.25.0", default-features = false }
serde = { workspace = true }
embedded-hal-1 = { package = "embedded-hal", version = "1.0.0", default-features = false }
embedded-hal = { version = "0.2.7", default-features = false }
linux-embedded-hal = { workspace = true, optional = true }

[features]
default = []
std = ["cu29/std", "cu-sensor-payloads/std", "serde/std"]
textlogs = ["cu29/textlogs", "cu-sensor-payloads/textlogs"]
embedded-hal = []
linux-embedded-hal = ["std", "dep:linux-embedded-hal"]
mock = []
