[package]
name = "cu-dps310"
description = "Copper source driver for the DPS310 digital barometric pressure sensor."
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
keywords.workspace = true
categories.workspace = true
homepage.workspace = true
repository.workspace = true

[dependencies]
cu29 = { path = "../../../core/cu29", version = "0.15.0", default-features = false }
cu-sensor-payloads = { path = "../../payloads/cu_sensor_payloads", version = "0.15.0", default-features = false }
serde = { workspace = true }

[features]
default = []
std = ["cu29/std", "cu-sensor-payloads/std", "serde/std"]
defmt = ["cu29/defmt"]
textlogs = ["cu29/textlogs", "cu-sensor-payloads/textlogs"]

[package.metadata.cargo-shear]
ignored = ["serde"]
