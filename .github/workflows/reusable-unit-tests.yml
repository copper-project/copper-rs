name: Reusable Unit Tests

on:
  workflow_call:
    inputs:
      toolchain:
        required: true
        type: string
      cargo_target_dir:
        required: false
        type: string
        default: ""
      linux_cargo_paths:
        required: false
        type: boolean
        default: false
      linux_ci_image:
        required: false
        type: string
        default: ""
      linux_cuda_ci_image:
        required: false
        type: string
        default: ""

jobs:
  unit-linux-container:
    if: inputs.linux_ci_image != ''
    name: Unit Checks / ${{ matrix.task }} (ubuntu-26.04, debug)
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.linux_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    strategy:
      fail-fast: false
      matrix:
        task: [ clippy, build, test ]

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          prebaked_linux_image: "true"
          cache_prefix: debug
          cache_shared_key: rust-ubuntu-latest
          install_nextest: ${{ matrix.task == 'test' }}
          sccache_key_suffix: unit-${{ matrix.task }}
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Detect embedded-only crates
        run: |
          EXCLUDES=$(python3 support/ci/embedded_crates.py excludes)
          echo "EMBEDDED_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run clippy on (ubuntu-26.04 | debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $EMBEDDED_EXCLUDES -- --deny warnings
      - name: Run clippy with all features on (ubuntu-26.04 | debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $EMBEDDED_EXCLUDES -- --deny warnings
      - name: Run build with all features on (ubuntu-26.04 | debug)
        if: matrix.task == 'build'
        run: cargo +${{ inputs.toolchain }} build $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $EMBEDDED_EXCLUDES
      - name: Run doctests on (ubuntu-26.04 | debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} test --doc $WORKSPACE_FLAG $EMBEDDED_EXCLUDES --quiet
      - name: Run Unit Tests on (ubuntu-26.04 | debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $EMBEDDED_EXCLUDES
      - name: Run cu-caterpillar determinism test (determinism_ci)
        if: matrix.task == 'test'
        env:
          RAYON_NUM_THREADS: "1"
          COPPER_DETERMINISM_ITERS: "256"
          COPPER_DETERMINISM_DT_TICKS: "1000"
        run: >
          cargo +${{ inputs.toolchain }} test -p cu-caterpillar --features determinism_ci
          -- determinism_record_and_resim --test-threads=1
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  unit-linux-host:
    if: inputs.linux_ci_image == ''
    name: Unit Checks / ${{ matrix.task }} (ubuntu-latest, debug)
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    strategy:
      fail-fast: false
      matrix:
        task: [ clippy, build, test ]

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          cache_prefix: debug
          cache_shared_key: rust-ubuntu-latest
          install_nextest: ${{ matrix.task == 'test' }}
          sccache_key_suffix: unit-${{ matrix.task }}
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Detect embedded-only crates
        run: |
          EXCLUDES=$(python3 support/ci/embedded_crates.py excludes)
          echo "EMBEDDED_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run clippy on (ubuntu-latest | debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $EMBEDDED_EXCLUDES -- --deny warnings
      - name: Run clippy with all features on (ubuntu-latest | debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $EMBEDDED_EXCLUDES -- --deny warnings
      - name: Run build with all features on (ubuntu-latest | debug)
        if: matrix.task == 'build'
        run: cargo +${{ inputs.toolchain }} build $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $EMBEDDED_EXCLUDES
      - name: Run doctests on (ubuntu-latest | debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} test --doc $WORKSPACE_FLAG $EMBEDDED_EXCLUDES --quiet
      - name: Run Unit Tests on (ubuntu-latest | debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $EMBEDDED_EXCLUDES
      - name: Run cu-caterpillar determinism test (determinism_ci)
        if: matrix.task == 'test'
        env:
          RAYON_NUM_THREADS: "1"
          COPPER_DETERMINISM_ITERS: "256"
          COPPER_DETERMINISM_DT_TICKS: "1000"
        run: >
          cargo +${{ inputs.toolchain }} test -p cu-caterpillar --features determinism_ci
          -- determinism_record_and_resim --test-threads=1
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  unit-linux-cuda-container:
    if: inputs.linux_cuda_ci_image != ''
    name: Unit Checks / ${{ matrix.task }} (cuda-ubuntu-24.04, cuda-debug)
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.linux_cuda_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    strategy:
      fail-fast: false
      matrix:
        task: [ clippy, build, test ]

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          prebaked_linux_image: "true"
          cache_prefix: cuda-debug
          cache_shared_key: rust-ubuntu-latest
          install_nextest: ${{ matrix.task == 'test' }}
          sccache_key_suffix: unit-${{ matrix.task }}
      - name: Set CUDA compute capability (CI)
        run: |
          if command -v nvcc >/dev/null 2>&1; then
            CAP=$(nvcc --list-gpu-code | awk -F_ '/sm_/ {print $2}' | sort -n | tail -1)
            if [[ -n "$CAP" ]]; then
              echo "CUDA_COMPUTE_CAP=$CAP" >> $GITHUB_ENV
            else
              echo "CUDA_COMPUTE_CAP=86" >> $GITHUB_ENV
            fi
          else
            echo "CUDA_COMPUTE_CAP=86" >> $GITHUB_ENV
          fi
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python,cuda" >> $GITHUB_ENV
      - name: Detect embedded-only crates
        run: |
          EXCLUDES=$(python3 support/ci/embedded_crates.py excludes)
          echo "EMBEDDED_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run clippy on (cuda-ubuntu-24.04 | cuda-debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $EMBEDDED_EXCLUDES -- --deny warnings
      - name: Run clippy with all features on (cuda-ubuntu-24.04 | cuda-debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $EMBEDDED_EXCLUDES -- --deny warnings
      - name: Run build with all features on (cuda-ubuntu-24.04 | cuda-debug)
        if: matrix.task == 'build'
        run: cargo +${{ inputs.toolchain }} build $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $EMBEDDED_EXCLUDES
      - name: Run Unit Tests on (cuda-ubuntu-24.04 | cuda-debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $EMBEDDED_EXCLUDES
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  unit-other:
    name: Unit Checks / ${{ matrix.task }} (${{ matrix.os }}, debug)
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: ${{ matrix.os == 'windows-latest' && 'core' || 'workspace' }}

    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]
        task: [ build, test ]

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          cache_prefix: debug
          cache_shared_key: rust-${{ matrix.os }}
          install_nextest: ${{ matrix.task == 'test' }}
          sccache_key_suffix: unit-${{ matrix.task }}
      - name: Set up Python (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Python task dependency (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install --upgrade pip cbor2
      - name: Set features (MacOS)
        if: runner.os == 'macOS'
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Set features (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "FEATURES_FLAG=" >> $GITHUB_ENV
      - name: Detect embedded-only crates
        if: env.WORKSPACE_SCOPE == 'workspace'
        run: |
          EXCLUDES=$(python3 support/ci/embedded_crates.py excludes)
          echo "EMBEDDED_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run build with all features on (${{ matrix.os }} | debug)
        if: matrix.task == 'build'
        run: cargo +${{ inputs.toolchain }} build $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $EMBEDDED_EXCLUDES
      - name: Run Unit Tests on (${{ matrix.os }} | debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $EMBEDDED_EXCLUDES
      - name: Run cu-caterpillar determinism test (determinism_ci)
        if: matrix.task == 'test' && matrix.os == 'macos-latest'
        env:
          RAYON_NUM_THREADS: "1"
          COPPER_DETERMINISM_ITERS: "256"
          COPPER_DETERMINISM_DT_TICKS: "1000"
        run: >
          cargo +${{ inputs.toolchain }} test -p cu-caterpillar --features determinism_ci
          -- determinism_record_and_resim --test-threads=1
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  tests-features-linux-container:
    if: inputs.linux_ci_image != ''
    name: Unit Tests (all features) (ubuntu-26.04, debug)
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.linux_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          prebaked_linux_image: "true"
          cache_prefix: debug
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "true"
          sccache_key_suffix: tests-features
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Detect embedded-only crates
        run: |
          EXCLUDES=$(python3 support/ci/embedded_crates.py excludes)
          echo "EMBEDDED_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests with all features on (ubuntu-26.04 | debug)
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $EMBEDDED_EXCLUDES
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  tests-features-linux-host:
    if: inputs.linux_ci_image == ''
    name: Unit Tests (all features) (ubuntu-latest, debug)
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          cache_prefix: debug
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "true"
          sccache_key_suffix: tests-features
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Detect embedded-only crates
        run: |
          EXCLUDES=$(python3 support/ci/embedded_crates.py excludes)
          echo "EMBEDDED_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests with all features on (ubuntu-latest | debug)
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $EMBEDDED_EXCLUDES
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  tests-features-linux-cuda-container:
    if: inputs.linux_cuda_ci_image != ''
    name: Unit Tests (all features) (cuda-ubuntu-24.04, cuda-debug)
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.linux_cuda_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          prebaked_linux_image: "true"
          cache_prefix: cuda-debug
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "true"
          sccache_key_suffix: tests-features
      - name: Set CUDA compute capability (CI)
        run: |
          if command -v nvcc >/dev/null 2>&1; then
            CAP=$(nvcc --list-gpu-code | awk -F_ '/sm_/ {print $2}' | sort -n | tail -1)
            if [[ -n "$CAP" ]]; then
              echo "CUDA_COMPUTE_CAP=$CAP" >> $GITHUB_ENV
            else
              echo "CUDA_COMPUTE_CAP=86" >> $GITHUB_ENV
            fi
          else
            echo "CUDA_COMPUTE_CAP=86" >> $GITHUB_ENV
          fi
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python,cuda" >> $GITHUB_ENV
      - name: Detect embedded-only crates
        run: |
          EXCLUDES=$(python3 support/ci/embedded_crates.py excludes)
          echo "EMBEDDED_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests with all features on (cuda-ubuntu-24.04 | cuda-debug)
        run: |
          if ! ldconfig -p 2>/dev/null | grep -q 'libcuda\.so\.1'; then
            echo "libcuda.so.1 not found; compiling all-feature tests without executing them."
            cargo +${{ inputs.toolchain }} test --no-run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $EMBEDDED_EXCLUDES
            exit 0
          fi
          cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $EMBEDDED_EXCLUDES
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  tests-features-other:
    name: Unit Tests (all features) (${{ matrix.os }}, debug)
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: ${{ matrix.os == 'windows-latest' && 'core' || 'workspace' }}

    strategy:
      fail-fast: false
      matrix:
        os: [ macos-latest, windows-latest ]

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          cache_prefix: debug
          cache_shared_key: rust-${{ matrix.os }}
          install_nextest: "true"
          sccache_key_suffix: tests-features
      - name: Set up Python (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Python task dependency (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install --upgrade pip cbor2
      - name: Set features (MacOS)
        if: runner.os == 'macOS'
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Set features (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "FEATURES_FLAG=" >> $GITHUB_ENV
      - name: Detect embedded-only crates
        if: env.WORKSPACE_SCOPE == 'workspace'
        run: |
          EXCLUDES=$(python3 support/ci/embedded_crates.py excludes)
          echo "EMBEDDED_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests with all features on (${{ matrix.os }} | debug)
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $EMBEDDED_EXCLUDES
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  templates-linux-container:
    if: inputs.linux_ci_image != ''
    name: Templates (debug) (ubuntu-latest, debug)
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.linux_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v6
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          prebaked_linux_image: "true"
          cache_prefix: debug
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "false"
          sccache_key_suffix: templates
      - name: Install cargo-generate on (ubuntu-latest | debug)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-generate
      - name: Generate new templates on (ubuntu-latest | debug)
        run: |
