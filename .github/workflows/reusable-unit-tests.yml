name: Reusable Unit Tests

on:
  workflow_call:
    inputs:
      toolchain:
        required: true
        type: string
      cargo_target_dir:
        required: false
        type: string
        default: ""
      linux_cargo_paths:
        required: false
        type: boolean
        default: false
      linux_disk_workarounds:
        required: false
        type: boolean
        default: true
      linux_ci_image:
        required: false
        type: string
        default: ""
      linux_cuda_ci_image:
        required: false
        type: string
        default: ""
      linux_runner_label:
        required: false
        type: string
        default: "ubuntu-latest-m"
      linux_light_runner_label:
        required: false
        type: string
        default: "ubuntu-latest-m"
      windows_runner_label:
        required: false
        type: string
        default: "windows-latest-l"
      run_linux:
        required: false
        type: boolean
        default: true
      run_cuda:
        required: false
        type: boolean
        default: true
      run_other:
        required: false
        type: boolean
        default: true

jobs:
  unit-linux-container:
    if: inputs.run_linux && inputs.linux_ci_image != ''
    name: Unit Checks / ${{ matrix.task }} (ubuntu-26.04, debug)
    runs-on: ${{ inputs.linux_runner_label }}
    container:
      image: ${{ inputs.linux_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    strategy:
      fail-fast: false
      matrix:
        task: [clippy, test, trybuild]

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          prebaked_linux_image: "true"
          cache_prefix: debug-ubuntu26-container
          cache_shared_key: rust-ubuntu-latest
          install_nextest: ${{ matrix.task == 'test' }}
          sccache_key_suffix: unit-${{ matrix.task }}
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Detect default workspace exclusions
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run clippy on (ubuntu-26.04 | debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $WORKSPACE_EXCLUDES -- --deny warnings
      - name: Run clippy with all features on (ubuntu-26.04 | debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $WORKSPACE_EXCLUDES -- --deny warnings
      - name: Run Unit Tests on (ubuntu-26.04 | debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $WORKSPACE_EXCLUDES -- --skip test_compile_fail
      - name: Run cu29-derive trybuild tests on (ubuntu-26.04 | debug)
        if: matrix.task == 'trybuild'
        run: cargo +${{ inputs.toolchain }} test -p cu29-derive test_compile_fail -- --nocapture
      - name: Run cu-caterpillar determinism test (determinism_ci)
        if: matrix.task == 'test'
        env:
          RAYON_NUM_THREADS: "1"
          COPPER_DETERMINISM_ITERS: "256"
          COPPER_DETERMINISM_DT_TICKS: "1000"
        run: >
          cargo +${{ inputs.toolchain }} test -p cu-caterpillar --features determinism_ci
          -- determinism_record_and_resim --test-threads=1
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  unit-linux-host:
    if: inputs.run_linux && inputs.linux_ci_image == ''
    name: Unit Checks / ${{ matrix.task }} (${{ inputs.linux_runner_label }}, debug)
    runs-on: ${{ inputs.linux_runner_label }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    strategy:
      fail-fast: false
      matrix:
        task: [clippy, test, trybuild]

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          cache_prefix: debug-ubuntu-host
          cache_shared_key: rust-ubuntu-latest
          install_nextest: ${{ matrix.task == 'test' }}
          sccache_key_suffix: unit-${{ matrix.task }}
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Detect default workspace exclusions
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run clippy on (${{ inputs.linux_runner_label }} | debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $WORKSPACE_EXCLUDES -- --deny warnings
      - name: Run clippy with all features on (${{ inputs.linux_runner_label }} | debug)
        if: matrix.task == 'clippy'
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $WORKSPACE_EXCLUDES -- --deny warnings
      - name: Run Unit Tests on (${{ inputs.linux_runner_label }} | debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $WORKSPACE_EXCLUDES -- --skip test_compile_fail
      - name: Run cu29-derive trybuild tests on (${{ inputs.linux_runner_label }} | debug)
        if: matrix.task == 'trybuild'
        run: cargo +${{ inputs.toolchain }} test -p cu29-derive test_compile_fail -- --nocapture
      - name: Run cu-caterpillar determinism test (determinism_ci)
        if: matrix.task == 'test'
        env:
          RAYON_NUM_THREADS: "1"
          COPPER_DETERMINISM_ITERS: "256"
          COPPER_DETERMINISM_DT_TICKS: "1000"
        run: >
          cargo +${{ inputs.toolchain }} test -p cu-caterpillar --features determinism_ci
          -- determinism_record_and_resim --test-threads=1
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  doctests-linux-container:
    if: inputs.run_linux && inputs.linux_ci_image != ''
    name: Doctests (ubuntu-26.04, debug)
    runs-on: ${{ inputs.linux_light_runner_label }}
    container:
      image: ${{ inputs.linux_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          prebaked_linux_image: "true"
          cache_prefix: debug-ubuntu26-container
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "false"
          sccache_key_suffix: doctests
      - name: Detect default workspace exclusions
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run doctests on (ubuntu-26.04 | debug)
        run: cargo +${{ inputs.toolchain }} test --doc $WORKSPACE_FLAG $WORKSPACE_EXCLUDES --quiet
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  doctests-linux-host:
    if: inputs.run_linux && inputs.linux_ci_image == ''
    name: Doctests (${{ inputs.linux_light_runner_label }}, debug)
    runs-on: ${{ inputs.linux_light_runner_label }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          cache_prefix: debug-ubuntu-host
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "false"
          sccache_key_suffix: doctests
      - name: Detect default workspace exclusions
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run doctests on (${{ inputs.linux_light_runner_label }} | debug)
        run: cargo +${{ inputs.toolchain }} test --doc $WORKSPACE_FLAG $WORKSPACE_EXCLUDES --quiet
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  unit-linux-cuda-container:
    if: inputs.run_cuda && inputs.linux_cuda_ci_image != ''
    name: Unit Checks / clippy (cuda-ubuntu-24.04, cuda-debug)
    runs-on: ${{ inputs.linux_runner_label }}
    container:
      image: ${{ inputs.linux_cuda_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          prebaked_linux_image: "true"
          cache_prefix: cuda-debug-ubuntu24-container
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "false"
          sccache_key_suffix: unit-clippy
      - name: Set CUDA compute capability (CI)
        run: |
          if command -v nvcc >/dev/null 2>&1; then
            CAP=$(nvcc --list-gpu-code | awk -F_ '/sm_/ {print $2}' | sort -n | tail -1)
            if [[ -n "$CAP" ]]; then
              echo "CUDA_COMPUTE_CAP=$CAP" >> $GITHUB_ENV
            else
              echo "CUDA_COMPUTE_CAP=86" >> $GITHUB_ENV
            fi
          else
            echo "CUDA_COMPUTE_CAP=86" >> $GITHUB_ENV
          fi
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python,cuda" >> $GITHUB_ENV
      - name: Detect default workspace exclusions
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run clippy with all features on (cuda-ubuntu-24.04 | cuda-debug)
        run: cargo +${{ inputs.toolchain }} clippy $RELEASE_FLAG $WORKSPACE_FLAG --all-targets $FEATURES_FLAG $WORKSPACE_EXCLUDES -- --deny warnings
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  unit-other:
    if: inputs.run_other
    name: Unit Checks / ${{ matrix.task }} (${{ matrix.target_os == 'windows' && inputs.windows_runner_label || 'macos-latest' }}, debug)
    runs-on: ${{ matrix.target_os == 'windows' && inputs.windows_runner_label || 'macos-latest' }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: ${{ matrix.target_os == 'windows' && 'core' || 'workspace' }}

    strategy:
      fail-fast: false
      matrix:
        target_os: [macos, windows]
        task: [test, trybuild]

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          cache_prefix: debug
          cache_shared_key: rust-${{ matrix.target_os }}
          install_nextest: ${{ matrix.task == 'test' }}
          sccache_key_suffix: unit-${{ matrix.task }}
      - name: Set up Python (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Python task dependency (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install --upgrade pip cbor2
      - name: Set features (MacOS)
        if: runner.os == 'macOS'
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Set features (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "FEATURES_FLAG=" >> $GITHUB_ENV
      - name: Detect default workspace exclusions
        if: env.WORKSPACE_SCOPE == 'workspace'
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests on (${{ matrix.target_os == 'windows' && inputs.windows_runner_label || 'macos-latest' }} | debug)
        if: matrix.task == 'test'
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $WORKSPACE_EXCLUDES -- --skip test_compile_fail
      - name: Run cu29-derive trybuild tests on (${{ matrix.target_os == 'windows' && inputs.windows_runner_label || 'macos-latest' }} | debug)
        if: matrix.task == 'trybuild'
        run: cargo +${{ inputs.toolchain }} test -p cu29-derive test_compile_fail -- --nocapture
      - name: Run cu-caterpillar determinism test (determinism_ci)
        if: matrix.task == 'test' && matrix.target_os == 'macos'
        env:
          RAYON_NUM_THREADS: "1"
          COPPER_DETERMINISM_ITERS: "256"
          COPPER_DETERMINISM_DT_TICKS: "1000"
        run: >
          cargo +${{ inputs.toolchain }} test -p cu-caterpillar --features determinism_ci
          -- determinism_record_and_resim --test-threads=1
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  windows-component-smoke:
    if: inputs.run_other
    name: Component Smoke (Windows, debug)
    runs-on: ${{ inputs.windows_runner_label }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      WORKSPACE_SCOPE: core

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          cache_prefix: debug
          cache_shared_key: rust-windows
          install_nextest: "false"
          sccache_key_suffix: windows-component-smoke
      - name: Check selected Windows components
        run: >
          cargo +${{ inputs.toolchain }} check --all-targets
          -p cu-consolemon
          -p cu-tuimon
          -p cu-logmon
          -p cu-safetymon
          -p cu-sensor-payloads
          -p cu-spatial-payloads
          -p cu-gnss-payloads
          -p cu-transform
          -p cu-pid
          -p cu-ahrs
          -p cu-ratelimit
          -p cu-caterpillar
          -p cu-bridge-test
          -p cu-resources-test
          -p cu-monitoring
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  tests-features-linux-container:
    if: inputs.run_linux && inputs.linux_ci_image != ''
    name: Unit Tests (all features) (ubuntu-26.04, debug)
    runs-on: ${{ inputs.linux_runner_label }}
    container:
      image: ${{ inputs.linux_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          prebaked_linux_image: "true"
          cache_prefix: debug-ubuntu26-container
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "true"
          sccache_key_suffix: tests-features
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Detect default workspace exclusions
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests with all features on (ubuntu-26.04 | debug)
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $WORKSPACE_EXCLUDES -- --skip test_compile_fail
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  tests-features-linux-host:
    if: inputs.run_linux && inputs.linux_ci_image == ''
    name: Unit Tests (all features) (${{ inputs.linux_runner_label }}, debug)
    runs-on: ${{ inputs.linux_runner_label }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          cache_prefix: debug-ubuntu-host
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "true"
          sccache_key_suffix: tests-features
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Detect default workspace exclusions
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests with all features on (${{ inputs.linux_runner_label }} | debug)
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $WORKSPACE_EXCLUDES -- --skip test_compile_fail
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  tests-features-linux-cuda-container:
    if: inputs.run_cuda && inputs.linux_cuda_ci_image != ''
    name: Unit Tests (all features) (cuda-ubuntu-24.04, cuda-debug)
    runs-on: ${{ inputs.linux_runner_label }}
    container:
      image: ${{ inputs.linux_cuda_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          prebaked_linux_image: "true"
          cache_prefix: cuda-debug-ubuntu24-container
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "true"
          sccache_key_suffix: tests-features
      - name: Set CUDA compute capability (CI)
        run: |
          if command -v nvcc >/dev/null 2>&1; then
            CAP=$(nvcc --list-gpu-code | awk -F_ '/sm_/ {print $2}' | sort -n | tail -1)
            if [[ -n "$CAP" ]]; then
              echo "CUDA_COMPUTE_CAP=$CAP" >> $GITHUB_ENV
            else
              echo "CUDA_COMPUTE_CAP=86" >> $GITHUB_ENV
            fi
          else
            echo "CUDA_COMPUTE_CAP=86" >> $GITHUB_ENV
          fi
      - name: Set features (Linux)
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python,cuda" >> $GITHUB_ENV
      - name: Detect default workspace exclusions
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests with all features on (cuda-ubuntu-24.04 | cuda-debug)
        run: |
          if ! ldconfig -p 2>/dev/null | grep -q 'libcuda\.so\.1'; then
            echo "libcuda.so.1 not found; compiling all-feature tests without executing them."
            cargo +${{ inputs.toolchain }} test --no-run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $WORKSPACE_EXCLUDES
            exit 0
          fi
          cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $WORKSPACE_EXCLUDES -- --skip test_compile_fail
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  tests-features-other:
    if: inputs.run_other
    name: Unit Tests (all features) (${{ matrix.target_os == 'windows' && inputs.windows_runner_label || 'macos-latest' }}, debug)
    runs-on: ${{ matrix.target_os == 'windows' && inputs.windows_runner_label || 'macos-latest' }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      BASE_FEATURES: mock,cu-sensor-payloads/image,kornia,gst,faer,nalgebra,glam,debug_pane,bincode,log-level-debug
      WORKSPACE_SCOPE: ${{ matrix.target_os == 'windows' && 'core' || 'workspace' }}

    strategy:
      fail-fast: false
      matrix:
        target_os: [macos, windows]

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          cache_prefix: debug
          cache_shared_key: rust-${{ matrix.target_os }}
          install_nextest: "true"
          sccache_key_suffix: tests-features
      - name: Set up Python (macOS)
        if: runner.os == 'macOS'
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Install Python task dependency (macOS)
        if: runner.os == 'macOS'
        run: python -m pip install --upgrade pip cbor2
      - name: Set features (MacOS)
        if: runner.os == 'macOS'
        run: |
          echo "FEATURES_FLAG=--features $BASE_FEATURES,python" >> $GITHUB_ENV
      - name: Set features (Windows)
        if: runner.os == 'Windows'
        run: |
          echo "FEATURES_FLAG=" >> $GITHUB_ENV
      - name: Detect default workspace exclusions
        if: env.WORKSPACE_SCOPE == 'workspace'
        run: |
          EXCLUDES=$(python3 support/ci/workspace_excludes.py excludes --toolchain ${{ inputs.toolchain }})
          echo "WORKSPACE_EXCLUDES=$EXCLUDES" >> $GITHUB_ENV
      - name: Run Unit Tests with all features on (${{ matrix.target_os == 'windows' && inputs.windows_runner_label || 'macos-latest' }} | debug)
        run: cargo +${{ inputs.toolchain }} nextest run $RELEASE_FLAG --all-targets $WORKSPACE_FLAG $FEATURES_FLAG $WORKSPACE_EXCLUDES -- --skip test_compile_fail
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

  templates-linux-container:
    if: inputs.run_linux && inputs.linux_ci_image != ''
    name: Templates (debug) (${{ inputs.linux_light_runner_label }}, debug)
    runs-on: ${{ inputs.linux_light_runner_label }}
    container:
      image: ${{ inputs.linux_ci_image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    defaults:
      run:
        shell: bash

    env:
      CARGO_TERM_COLOR: always
      WORKSPACE_SCOPE: workspace

    steps:
      - uses: actions/checkout@v7
      - id: rust_ci_setup
        uses: ./.github/actions/rust-ci-setup
        with:
          toolchain: ${{ inputs.toolchain }}
          cargo_target_dir: ${{ inputs.cargo_target_dir }}
          linux_cargo_paths: ${{ inputs.linux_cargo_paths }}
          linux_disk_workarounds: ${{ inputs.linux_disk_workarounds }}
          prebaked_linux_image: "true"
          cache_prefix: debug-ubuntu26-container
          cache_shared_key: rust-ubuntu-latest
          install_nextest: "false"
          sccache_key_suffix: templates
      - name: Install cargo-generate on (${{ inputs.linux_light_runner_label }} | debug)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-generate
      - name: Generate new templates on (${{ inputs.linux_light_runner_label }} | debug)
        run: |
          export USER="${USER:-${GITHUB_ACTOR:-ci}}"
          export USERNAME="${USERNAME:-$USER}"
          rm -rf support/cargo_cunew/templates/test_project support/cargo_cunew/templates/test_workspace
          cargo +${{ inputs.toolchain }} run -p cargo-cunew -- support/cargo_cunew/templates/test_project --template project --source local --copper-root .
          cargo +${{ inputs.toolchain }} run -p cargo-cunew -- support/cargo_cunew/templates/test_workspace --template workspace --source local --copper-root .
          tmpdir="$(mktemp -d)"
          cargo +${{ inputs.toolchain }} generate --path support/cargo_cunew/templates/cu_project --name cargo_generate_project --destination "$tmpdir" -d copper_source=local -d copper_root_path="$PWD" --silent
          echo "CARGO_GENERATE_PROJECT=$tmpdir/cargo_generate_project" >> $GITHUB_ENV
      - name: Build generated templates on (${{ inputs.linux_light_runner_label }} | debug)
        run: |
          bash support/cargo_cunew/templates/smoke_generated.sh \
            "${{ inputs.toolchain }}" \
            support/cargo_cunew/templates/test_project \
            support/cargo_cunew/templates/test_workspace \
            "$CARGO_GENERATE_PROJECT"
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache
        if: github.ref == 'refs/heads/master' && steps.rust_ci_setup.outputs.sccache_cache_primary_key != '' && steps.rust_ci_setup.outputs.sccache_cache_hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: ${{ steps.rust_ci_setup.outputs.sccache_cache_primary_key }}

