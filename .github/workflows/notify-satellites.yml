name: Notify Satellite Repos

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch copper-rs master update
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [zed, extra-examples, benchmarks]
    steps:
      - name: Skip when dispatch token is not configured
        if: ${{ secrets.COPPER_PROJECT_REPO_DISPATCH_TOKEN == '' }}
        run: echo "COPPER_PROJECT_REPO_DISPATCH_TOKEN is not configured; skipping repository dispatch."

      - name: Dispatch repository event
        if: ${{ secrets.COPPER_PROJECT_REPO_DISPATCH_TOKEN != '' }}
        env:
          DISPATCH_TOKEN: ${{ secrets.COPPER_PROJECT_REPO_DISPATCH_TOKEN }}
          TARGET_REPO: ${{ matrix.repo }}
          SOURCE_SHA: ${{ github.event_name == 'workflow_dispatch' && github.sha || github.event.workflow_run.head_sha }}
          SOURCE_RUN_ID: ${{ github.event_name == 'workflow_dispatch' && github.run_id || github.event.workflow_run.id }}
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            https://api.github.com/repos/copper-project/${TARGET_REPO}/dispatches \
            -d @- <<JSON
          {
            "event_type": "copper-rs-master",
            "client_payload": {
              "source_repo": "${GITHUB_REPOSITORY}",
              "source_sha": "${SOURCE_SHA}",
              "source_run_id": "${SOURCE_RUN_ID}"
            }
          }
          JSON
