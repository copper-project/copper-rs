name: Notify Satellite Repos

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    name: Trigger satellite CI
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo: [zed, extra-examples, benchmarks, cu-timetraveler]
    env:
      DISPATCH_TOKEN: ${{ secrets.COPPER_PROJECT_REPO_DISPATCH_TOKEN }}
      TARGET_REPO: ${{ matrix.repo }}
      TARGET_WORKFLOW: ci.yml
      TARGET_REF: master
    steps:
      - name: Trigger target CI workflow
        run: |
          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "::notice::COPPER_PROJECT_REPO_DISPATCH_TOKEN is not configured; skipping workflow dispatch."
            exit 0
          fi

          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/copper-project/${TARGET_REPO}/actions/workflows/${TARGET_WORKFLOW}/dispatches \
            -d @- <<JSON
          {
            "ref": "${TARGET_REF}"
          }
          JSON
