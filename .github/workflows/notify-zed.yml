name: "Notify ZED"

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    name: Dispatch ZED CI
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.conclusion == 'success'
        )
      }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.COPPER_PROJECT_REPO_DISPATCH_TOKEN }}
      SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
      SOURCE_RUN_ID: ${{ github.event.workflow_run.id || github.run_id }}
    steps:
      - name: Dispatch ZED CI
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "::notice::COPPER_PROJECT_REPO_DISPATCH_TOKEN is not configured; skipping ZED CI dispatch."
            exit 0
          fi

          gh api repos/copper-project/zed/dispatches \
            --method POST \
            -f event_type=copper-rs-master \
            -f "client_payload[source_repository]=${GITHUB_REPOSITORY}" \
            -f "client_payload[source_sha]=${SOURCE_SHA}" \
            -f "client_payload[source_run_id]=${SOURCE_RUN_ID}"
