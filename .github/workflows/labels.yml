name: Pull Request Guardrails

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled

permissions:
  contents: read
  pull-requests: read

jobs:
  do-not-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check for a "do-not-merge" label
        uses: mheap/github-action-required-labels@v5
        with:
          mode: exactly
          count: 0
          labels: "do-not-merge"
