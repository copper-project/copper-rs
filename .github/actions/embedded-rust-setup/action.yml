name: Embedded Rust Setup
description: Common embedded Rust setup for copper-rs workflows.
inputs:
  toolchain:
    description: Rust toolchain to install.
    required: true
  cargo_target_dir:
    description: Optional CARGO_TARGET_DIR override.
    required: false
    default: ""
  install_nextest:
    description: Whether to install nextest.
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Configure Cargo network retries
      shell: bash
      run: echo "CARGO_NET_RETRY=10" >> "$GITHUB_ENV"
    - name: Configure CARGO_TARGET_DIR
      if: inputs.cargo_target_dir != ''
      shell: bash
      run: echo "CARGO_TARGET_DIR=${{ inputs.cargo_target_dir }}" >> "$GITHUB_ENV"
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        targets: aarch64-unknown-none,thumbv7em-none-eabihf,thumbv8m.main-none-eabihf,riscv32imac-unknown-none-elf
        components: rustc,cargo,rust-std,rustfmt,clippy
    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        version: "v0.16.0"
    - name: Compute cache save policy
      id: cache_save_policy
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref }}
        REPOSITORY: ${{ github.repository }}
        PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
      run: |
        allowed=false
        if [[ "$REF_NAME" == "refs/heads/master" ]]; then
          allowed=true
        elif [[ "$EVENT_NAME" == "pull_request" && "$PR_HEAD_REPOSITORY" == "$REPOSITORY" ]]; then
          allowed=true
        fi
        echo "allowed=$allowed" >> "$GITHUB_OUTPUT"
    - name: Configure sccache
      shell: bash
      env:
        SCCACHE_GHA_RW_MODE_VALUE: ${{ steps.cache_save_policy.outputs.allowed == 'true' && 'READ_WRITE' || 'READ_ONLY' }}
      run: |
        sep=":"
        if [[ "${RUNNER_OS:-}" == "Windows" ]]; then
          sep=";"
        fi

        basedirs=()
        if [[ -n "${GITHUB_WORKSPACE:-}" ]]; then
          basedirs+=("$GITHUB_WORKSPACE")
        fi
        if [[ -n "${RUNNER_TEMP:-}" ]]; then
          basedirs+=("$RUNNER_TEMP")
        fi

        sccache_basedirs=""
        if [[ "${#basedirs[@]}" -gt 0 ]]; then
          sccache_basedirs="$(IFS="$sep"; echo "${basedirs[*]}")"
        fi

        {
          echo "SCCACHE_GHA_ENABLED=true"
          echo "SCCACHE_GHA_RW_MODE=$SCCACHE_GHA_RW_MODE_VALUE"
          echo "SCCACHE_BASEDIRS=$sccache_basedirs"
          echo "RUSTC_WRAPPER=sccache"
        } >> "$GITHUB_ENV"

        echo "sccache backend: GitHub Actions ($SCCACHE_GHA_RW_MODE_VALUE)"
        echo "sccache basedirs: ${sccache_basedirs:-<none>}"
    - name: Install latest nextest
      if: inputs.install_nextest == 'true'
      uses: taiki-e/install-action@nextest
    - name: Setup rust-cache
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: embedded-${{ inputs.toolchain }}
        shared-key: rust-embedded-${{ inputs.toolchain }}
        save-if: ${{ steps.cache_save_policy.outputs.allowed == 'true' }}
        cache-targets: "false"
        cache-bin: "true"
