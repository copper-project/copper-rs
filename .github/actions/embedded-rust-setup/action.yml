name: Embedded Rust Setup
description: Common embedded Rust setup for copper-rs workflows.
inputs:
  toolchain:
    description: Rust toolchain to install.
    required: true
  cargo_target_dir:
    description: Optional CARGO_TARGET_DIR override.
    required: false
    default: ""
  install_nextest:
    description: Whether to install nextest.
    required: false
    default: "false"
  sccache_restore:
    description: Whether to restore the legacy local SCCACHE_DIR cache.
    required: false
    default: "false"
  sccache_write:
    description: Whether this job may write to the sccache GitHub Actions backend on master.
    required: false
    default: "false"
  sccache_key_suffix:
    description: Suffix used to separate sccache writers per job/task.
    required: true
  sccache_dir:
    description: Optional SCCACHE_DIR override.
    required: false
    default: ""
outputs:
  sccache_cache_hit:
    description: Whether sccache restore matched the primary key.
    value: ${{ steps.restore_sccache.outputs.cache-hit }}
  sccache_cache_matched_key:
    description: Cache key that was restored, if any.
    value: ${{ steps.restore_sccache.outputs.cache-matched-key }}
  sccache_cache_primary_key:
    description: Primary sccache key for this job.
    value: ${{ steps.sccache_key.outputs.primary }}
  sccache_cache_save_allowed:
    description: Whether this run is allowed to save CI caches.
    value: ${{ steps.sccache_save_policy.outputs.allowed }}
runs:
  using: composite
  steps:
    - name: Configure Cargo network retries
      shell: bash
      run: echo "CARGO_NET_RETRY=10" >> "$GITHUB_ENV"
    - name: Configure CARGO_TARGET_DIR
      if: inputs.cargo_target_dir != ''
      shell: bash
      run: echo "CARGO_TARGET_DIR=${{ inputs.cargo_target_dir }}" >> "$GITHUB_ENV"
    - uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ inputs.toolchain }}
        targets: aarch64-unknown-none,thumbv7em-none-eabihf,thumbv8m.main-none-eabihf,riscv32imac-unknown-none-elf
        components: rustc,cargo,rust-std,rustfmt,clippy
    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.9
    - name: Configure sccache
      shell: bash
      run: |
        SCCACHE_DIR="${{ inputs.sccache_dir }}"
        if [[ -z "$SCCACHE_DIR" ]]; then
          SCCACHE_DIR="$PWD/.sccache"
        fi
        sccache_gha_rw_mode=READ_ONLY
        if [[ "${{ inputs.sccache_write }}" == "true" && "$GITHUB_REF" == "refs/heads/master" && "$GITHUB_EVENT_NAME" != "pull_request" ]]; then
          sccache_gha_rw_mode=READ_WRITE
        fi
        mkdir -p "$SCCACHE_DIR"
        echo "SCCACHE_DIR=$SCCACHE_DIR" >> "$GITHUB_ENV"
        echo "SCCACHE_GHA_ENABLED=true" >> "$GITHUB_ENV"
        echo "SCCACHE_GHA_RW_MODE=$sccache_gha_rw_mode" >> "$GITHUB_ENV"
        echo "SCCACHE_GHA_VERSION=copper-rs-ci-v1" >> "$GITHUB_ENV"
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
    - name: Report sccache mode
      shell: bash
      run: |
        echo "sccache GHA mode: $SCCACHE_GHA_RW_MODE"
        echo "sccache GHA version: $SCCACHE_GHA_VERSION"
        echo "legacy local SCCACHE_DIR restore: ${{ inputs.sccache_restore }}"
    - name: Compute sccache keys
      if: inputs.sccache_restore == 'true'
      id: sccache_key
      shell: bash
      run: |
        primary="sccache-${{ runner.os }}-${{ runner.arch }}-${{ inputs.toolchain }}-embedded-${{ inputs.sccache_key_suffix }}-${{ github.sha }}"
        echo "primary=$primary" >> "$GITHUB_OUTPUT"
        {
          echo "restore_keys<<EOF"
          echo "sccache-${{ runner.os }}-${{ runner.arch }}-${{ inputs.toolchain }}-embedded-${{ inputs.sccache_key_suffix }}-"
          echo "sccache-${{ runner.os }}-${{ runner.arch }}-${{ inputs.toolchain }}-embedded-"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
    - name: Restore sccache
      if: inputs.sccache_restore == 'true'
      id: restore_sccache
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: ${{ steps.sccache_key.outputs.primary }}
        restore-keys: ${{ steps.sccache_key.outputs.restore_keys }}
    - name: Report sccache restore
      if: inputs.sccache_restore == 'true'
      shell: bash
      env:
        SCCACHE_REQUESTED_KEY: ${{ steps.sccache_key.outputs.primary }}
        SCCACHE_MATCHED_KEY: ${{ steps.restore_sccache.outputs.cache-matched-key }}
        SCCACHE_CACHE_HIT: ${{ steps.restore_sccache.outputs.cache-hit }}
      run: |
        status="miss"
        if [[ -n "$SCCACHE_MATCHED_KEY" ]]; then
          status="partial-hit"
          if [[ "$SCCACHE_CACHE_HIT" == "true" ]]; then
            status="exact-hit"
          fi
        fi
        echo "sccache requested key: $SCCACHE_REQUESTED_KEY"
        echo "sccache matched key: ${SCCACHE_MATCHED_KEY:-<none>}"
        echo "sccache restore status: $status"
        echo "sccache directory: $SCCACHE_DIR"
        if [[ -d "$SCCACHE_DIR" ]]; then
          du -sh "$SCCACHE_DIR" || true
          find "$SCCACHE_DIR" -mindepth 1 -maxdepth 1 | wc -l | awk '{print "sccache top-level entries: " $1}'
        fi
    - name: Compute cache save policy
      id: sccache_save_policy
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        REF_NAME: ${{ github.ref }}
        REPOSITORY: ${{ github.repository }}
        PR_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
      run: |
        allowed=false
        if [[ "$REF_NAME" == "refs/heads/master" ]]; then
          allowed=true
        elif [[ "$EVENT_NAME" == "pull_request" && "$PR_HEAD_REPOSITORY" == "$REPOSITORY" ]]; then
          allowed=true
        fi
        echo "allowed=$allowed" >> "$GITHUB_OUTPUT"
    - name: Install latest nextest
      if: inputs.install_nextest == 'true'
      uses: taiki-e/install-action@nextest
    - name: Setup rust-cache
      uses: Swatinem/rust-cache@v2
      with:
        prefix-key: embedded-${{ inputs.toolchain }}
        shared-key: rust-embedded-${{ inputs.toolchain }}
        save-if: ${{ steps.sccache_save_policy.outputs.allowed == 'true' }}
        cache-targets: "false"
        cache-bin: "true"
