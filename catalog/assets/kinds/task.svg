<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 90" role="img" aria-labelledby="title">
  <title>Task fallback visual</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#122d1a"/>
      <stop offset="100%" stop-color="#25643a"/>
    </linearGradient>
  </defs>
  <rect width="160" height="90" rx="18" fill="url(#bg)"/>
  <g transform="translate(55 45)">
    <g fill="#9aefaf">
      <polygon points="-4,-28 4,-28 5.5,-19 -5.5,-19"/>
      <polygon points="-4,-28 4,-28 5.5,-19 -5.5,-19" transform="rotate(45)"/>
      <polygon points="-4,-28 4,-28 5.5,-19 -5.5,-19" transform="rotate(90)"/>
      <polygon points="-4,-28 4,-28 5.5,-19 -5.5,-19" transform="rotate(135)"/>
      <polygon points="-4,-28 4,-28 5.5,-19 -5.5,-19" transform="rotate(180)"/>
      <polygon points="-4,-28 4,-28 5.5,-19 -5.5,-19" transform="rotate(225)"/>
      <polygon points="-4,-28 4,-28 5.5,-19 -5.5,-19" transform="rotate(270)"/>
      <polygon points="-4,-28 4,-28 5.5,-19 -5.5,-19" transform="rotate(315)"/>
    </g>
    <circle r="20" fill="#9aefaf"/>
    <circle r="12" fill="#25643a"/>
    <circle r="7" fill="#245734"/>
  </g>
</svg>
